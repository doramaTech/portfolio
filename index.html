<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Marina Style</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  padding: 30px 20px;
  border-right: 1px solid #eee;
  position: fixed;
  height: 100vh;
  background: #fff;
}

.sidebar h1 {
  font-size: 14px;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.sidebar a {
  display: block;
  text-decoration: none;
  color: #111;
  margin: 10px 0;
  font-size: 13px;
}

/* MAIN */
.main {
  margin-left: 240px;
  width: 100%;
}

/* SEÇÕES */
.section {
  padding: 40px 20px 10px;
}

.section h2 {
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 20px;
}

/* GALERIA */
.gallery {
  column-count: 3;
  column-gap: 10px;
}

.item {
  break-inside: avoid;
  margin-bottom: 10px;
}

.item img {
  width: 100%;
  border-radius: 4px;
  cursor: pointer;
}

/* TEXTO */
.text-block {
  background: #fafafa;
  padding: 15px;
  font-size: 13px;
  border-radius: 4px;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #25D366;
  color: white;
  padding: 12px 16px;
  border-radius: 50px;
  text-decoration: none;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  background: rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.lightbox img {
  max-width:90%;
  max-height:90%;
}

/* RESPONSIVO */
@media(max-width:900px){
  .gallery { column-count:2; }
  .sidebar { display:none; }
  .main { margin:0; }
}

@media(max-width:500px){
  .gallery { column-count:1; }
}
</style>

</head>
<body>

<!-- SIDEBAR COM ÂNCORAS -->
<div class="sidebar">
  <h1>ARTISTA</h1>
  <a href="#feminino">Feminino Sagrado</a>
  <a href="#natureza">Natureza</a>
  <a href="#indigenas">Indígenas Semente Sol</a>
  <a href="#pinturas">Ilustrações e Pinturas</a>
  <a href="#iniciacao">A Iniciação Feminina</a>
</div>

<div class="main">

  <!-- SEÇÃO 1 -->
  <section id="feminino" class="section">
    <h2>FEMININO SAGRADO</h2>
    <div class="gallery">
      <div class="item"><img src="https://picsum.photos/400/600"></div>
      <div class="item text-block">
        <p>O feminino sagrado como portal de reconexão com a essência.</p>
      </div>
      <div class="item"><img src="https://picsum.photos/400/500"></div>
    </div>
  </section>

  <!-- SEÇÃO 2 -->
  <section id="natureza" class="section">
    <h2>NATUREZA</h2>
    <div class="gallery">
      <div class="item"><img src="https://picsum.photos/400/700"></div>
      <div class="item"><img src="https://picsum.photos/400/400"></div>
    </div>
  </section>

  <!-- SEÇÃO 3 -->
  <section id="indigenas" class="section">
    <h2>INDÍGENAS SEMENTE SOL</h2>
    <div class="gallery">
      <div class="item"><img src="https://picsum.photos/400/650"></div>
      <div class="item text-block">
        <p>Memória viva dos povos e das sementes ancestrais.</p>
      </div>
    </div>
  </section>

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5511992451218" target="_blank">
  WhatsApp
</a>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>
const imgs = document.querySelectorAll(".item img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});
</script>

</body>
</html>
