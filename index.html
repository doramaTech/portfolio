<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Marina Style</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  padding: 30px 20px;
  border-right: 1px solid #eee;
  position: fixed;
  height: 100vh;
  background: #fff;
}

.sidebar h1 {
  font-size: 14px;
  margin-bottom: 20px;
  letter-spacing: 2px;
}

.sidebar a {
  display: block;
  text-decoration: none;
  color: #111;
  margin: 10px 0;
  font-size: 13px;
}

.sidebar a:hover {
  opacity: 0.6;
}

/* MAIN */
.main {
  margin-left: 240px;
  width: 100%;
}

/* GALERIA */
.gallery {
  column-count: 3;
  column-gap: 10px;
  padding: 10px;
}

/* ITENS */
.item {
  break-inside: avoid;
  margin-bottom: 10px;
}

.item img {
  width: 100%;
  border-radius: 4px;
  cursor: pointer;
}

/* BLOCO TEXTO */
.text-block {
  background: #fafafa;
  padding: 15px;
  font-size: 13px;
  border-radius: 4px;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #25D366;
  color: white;
  padding: 12px 16px;
  border-radius: 50px;
  font-size: 14px;
  text-decoration: none;
}

/* RESPONSIVO */
@media(max-width: 900px){
  .gallery { column-count: 2; }
  .sidebar { display: none; }
  .main { margin: 0; }
}

@media(max-width: 500px){
  .gallery { column-count: 1; }
}
</style>

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h1>ARTISTA</h1>
  <a href="#">Ilustrações Feminino Sagrado</a>
  <a href="#">Natureza</a>
  <a href="#">Indígenas Semente Sol</a>
  <a href="#">Ilustrações e Pinturas</a>
  <a href="#">A Iniciação Feminina</a>
</div>

<!-- MAIN -->
<div class="main">
  <div class="gallery">

    <div class="item"><img src="https://picsum.photos/400/600"></div>

    <div class="item text-block">
      <p>O feminino sagrado como expressão da natureza interior e conexão com ciclos ancestrais.</p>
    </div>

    <div class="item"><img src="https://picsum.photos/400/400"></div>
    <div class="item"><img src="https://picsum.photos/400/700"></div>

    <div class="item text-block">
      <p>As sementes carregam memória, os povos carregam histórias vivas.</p>
    </div>

    <div class="item"><img src="https://picsum.photos/400/500"></div>
    <div class="item"><img src="https://picsum.photos/400/650"></div>

  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/5511992451218" target="_blank">
  WhatsApp
</a>

<script>
const imgs = document.querySelectorAll(".item img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

imgs.forEach(img => {
  img.addEventListener("click", () => {
    lightbox.style.display = "flex";
    lightboxImg.src = img.src;
  });
});

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});
</script>

</body>
</html>
